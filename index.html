<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speaking Test Draw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="top-bar" aria-hidden="true"></div>
    <div class="bg-blobs" aria-hidden="true"></div>
    <main class="app">
      <header class="hero">
        <div class="hero-icon" aria-hidden="true">✦</div>
        <p class="hero-kicker">Random assignment</p>
        <h1 class="hero-title">Speaking Test Draw</h1>
        <p class="hero-sub">
          29 students &middot; 7 time slots &middot; shuffle, reveal, export PDF
        </p>
        <div class="hero-actions">
          <button type="button" id="startBtn" class="btn btn-primary">
            Start Draw
          </button>
          <button type="button" id="shuffleAgainBtn" class="btn btn-ghost hidden">
            Shuffle again
          </button>
        </div>
      </header>

      <section id="slot-grid" class="slot-grid" aria-live="polite"></section>

      <section id="successBanner" class="success-banner hidden" role="status">
        <span class="success-icon" aria-hidden="true">✓</span>
        All students assigned!
      </section>

      <div id="toast" class="toast hidden" role="status"></div>
      <button type="button" id="fallbackPdfBtn" class="btn btn-secondary hidden">
        Download PDF
      </button>

      <footer class="footer">
        Assignments are random. Use Shuffle again for a new draw.
      </footer>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
